# Config Principal - Projet Détection Intrusions IoT

[project]
name = IoT Network Intrusion Detection System
version = 0.1.0
description = Deep Learning-based detection of network intrusions in IoT environments
author = Team ML Security
date_created = 2026-02-25

[objective]
target_f1_score = 0.90
target_recall = 0.85
target_fpr = 0.05
target_zero_day_accuracy = 0.70
target_dl_vs_ml_improvement = 0.15

[datasets]
# À télécharger - Phase 5
cicids2017_url = https://www.unb.ca/cic/datasets/ids-2017.html
nsl_kdd_url = https://www.unb.ca/cic/datasets/nsl-kdd.html
iot_23_url = https://www.unb.ca/cic/datasets/iot-dataset.html

[data_preparation]
# Phase 6
train_split = 0.70
val_split = 0.15
test_split = 0.15
random_seed = 42
use_stratification = true
handle_class_imbalance = true
apply_smote = true
use_pca = false
pca_components = 50

[preprocessing]
# Phase 6
normalize_method = standardscaler
categorical_encoding = onehot
missing_value_strategy = median
outlier_handling = robust_scaler

[models]
# Phase 7 - Architectures à implémenter
# MLP (de base, existant)
mlp_hidden_dims = [256, 128]
mlp_dropout = 0.3
mlp_activation = relu

# LSTM
lstm_units = [128, 64]
lstm_bidirectional = true
lstm_dropout = 0.3

# CNN
cnn_filters = [32, 64, 128]
cnn_kernel_size = 3
cnn_pool_size = 2

# Autoencoder
autoencoder_latent_dim = 16
autoencoder_hidden_dims = [128, 64]

# Hybrid CNN-LSTM
hybrid_cnn_filters = [32, 64]
hybrid_lstm_units = 128

[training]
# Phase 8
epochs = 50
batch_size = 128
learning_rate = 0.001
optimizer = adam
loss_function = crossentropyloss
early_stopping = true
early_stopping_patience = 10
learning_rate_scheduler = true
checkpoint_best_model = true
use_gpu = true

[baselines]
# Phase 8.2
random_forest_n_estimators = 100
svm_kernel = rbf
svm_C = 1.0
xgboost_n_estimators = 100

[evaluation]
# Phase 9
metrics = [precision, recall, f1_score, accuracy, tpr, fpr, auc]
cross_validation_folds = 5
per_attack_type_metrics = true
zero_day_validation = true

[visualization]
# Phase 10
plot_roc_curves = true
plot_pr_curves = true
plot_confusion_matrix = true
plot_learning_curves = true
save_format = png
dpi = 300

[optimization]
# Phase 11
hyperparameter_tuning = true
tuning_method = optuna
tuning_trials = 100
architecture_search = true
model_quantization = true
quantization_bits = 8

[api]
# Phase 12
host = 0.0.0.0
port = 8000
workers = 4
max_batch_size = 100
timeout_seconds = 30
enable_streaming = true

[logging]
log_level = INFO
log_format = json
save_logs = true
log_directory = logs/

[paths]
# Format: relatif à la racine du projet
data_raw = data/raw/
data_processed = data/processed/
data_preprocessed = data/preprocessed/
models_dir = models/
results_dir = results/
logs_dir = logs/
notebooks_dir = notebooks/

[features]
# Noms des principales features réseau à extraire
src_ip = true
dst_ip = true
src_port = true
dst_port = true
protocol = true
packet_size = true
tcp_flags = true
flow_duration = true
inter_arrival_time = true
payload_bytes = true

[attack_types]
# Types d'attaques à détecter
dos = true
ddos = true
infiltration = true
scanning = true
spoofing = true
malware = true

[system_requirements]
python_version = 3.8+
pytorch_version = 2.0+
tensorflow_version = 2.10+
min_ram_gb = 8
recommend_ram_gb = 16
min_storage_gb = 50
gpu = NVIDIA (CUDA 11.8+)

[status]
# Mise à jour par chaque phase
phase_completed = 4
phase_current = 5
overall_progress_percent = 30
last_update = 2026-02-25
